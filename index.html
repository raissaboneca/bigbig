<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>LogiData 5000 - Big Data Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white overflow-hidden">
    <div class="flex h-screen">
        <aside class="w-80 bg-slate-800 p-6 flex flex-col border-r border-slate-700">
            <h1 class="text-2xl font-bold mb-2">LogiData <span class="text-blue-500">5000</span></h1>
            <p class="text-xs text-slate-400 mb-6">Monitoramento de Big Data em Tempo Real</p>
            
            <div class="space-y-4 flex-1">
                <div class="card bg-slate-700 p-4 rounded-lg">
                    <p class="text-sm text-slate-400">Veículos Ativos</p>
                    <h2 id="total-trucks" class="text-3xl font-mono">0</h2>
                </div>
                <div class="card bg-slate-700 p-4 rounded-lg">
                    <p class="text-sm text-slate-400">Consumo Médio (L/km)</p>
                    <h2 class="text-3xl font-mono text-green-400">2.4</h2>
                </div>
                <div class="card bg-slate-700 p-4 rounded-lg border-l-4 border-red-500">
                    <p class="text-sm text-slate-400">Falhas de Conectividade</p>
                    <h2 id="total-errors" class="text-3xl font-mono text-red-500">0</h2>
                </div>
            </div>

            <div class="mt-auto">
                <button onclick="simulateFailure()" class="w-full bg-red-600 hover:bg-red-700 p-2 rounded text-sm font-bold transition">SIMULAR FALHA DE SINAL</button>
            </div>
        </aside>

        <main class="flex-1 relative">
            <div id="map" class="h-full w-full"></div>
            
            <div id="alert-box" class="absolute top-4 right-4 z-[1000] hidden">
                <div class="bg-red-600 text-white px-6 py-3 rounded-lg shadow-2xl animate-pulse">
                    ⚠️ ALERTA: Perda de pacotes em 15% da frota (Região Sul)
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="simulation.js"></script>
</body>
</html>
